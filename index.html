<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MD SPEC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Asta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;
  --border:#2a2a35;--accent:#c8f135;--danger:#ff5f5f;
  --text:#e8e8ed;--text2:#8888a0;--text3:#5a5a70;--blue:#5b9cf6;
  --r:4px;
  --t-nav:12px;
  --t-xs:9px;
  --t-sm:10px;
  --t-md:11px;
  --t-base:12px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Asta Sans',sans-serif;}
html,body{height:100%;background:var(--bg);color:var(--text);font-size:var(--t-base);line-height:1.6;color-scheme:dark;letter-spacing:-.01em;}
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden;}

/* ── GNB ── */
.gnb{background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.gnb-top{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:44px;}
.logo{font-size:13px;font-weight:800;letter-spacing:-.03em;color:var(--accent);white-space:nowrap;}
.logo span{color:var(--text3);font-weight:400;letter-spacing:-.01em;}
.gnb-nav{display:flex;padding:0 10px;border-top:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.gnb-nav::-webkit-scrollbar{display:none;}
.gnb-tab{padding:0 14px;height:36px;border:none;background:none;cursor:pointer;font-size:var(--t-nav);font-weight:600;color:var(--text3);border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;letter-spacing:-.01em;flex-shrink:0;}
.gnb-tab:hover{color:var(--text2);}
.gnb-tab.active{color:var(--text);border-bottom-color:var(--accent);}
.gnb-csv{padding:5px 11px;background:transparent;border:1px solid var(--border);border-radius:var(--r);font-size:var(--t-md);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;letter-spacing:-.01em;}
.gnb-csv:hover{border-color:var(--accent);color:var(--accent);}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;}
.content-inner{padding:14px 14px 80px;max-width:660px;margin:0 auto;}

/* ── PRODUCT CTRL ── */
.product-row{display:flex;gap:6px;align-items:center;margin-bottom:10px;}
.product-sel{flex:1;min-width:0;}
.preset-btn{height:30px;flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-size:var(--t-md);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;letter-spacing:-.01em;}
.preset-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── FORMS ── */
.form-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 11px;color:var(--text);font-size:var(--t-base);outline:none;transition:border-color .2s;letter-spacing:-.01em;}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--text3);}
.form-input.sm{padding:6px 9px;font-size:var(--t-base);}
textarea.form-input{line-height:1.55;resize:none;}
select.form-input{cursor:pointer;-webkit-appearance:none;appearance:none;}
.sel-wrap{position:relative;}
.sel-wrap::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:9px;}
.sel-wrap select{padding-right:22px;}
.section-div{font-size:var(--t-xs);font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.sect-hdr{font-size:var(--t-base);font-weight:700;color:var(--accent);padding:8px 0;border-bottom:1px solid var(--border);margin:14px 0 10px;letter-spacing:-.01em;}

/* ── BUTTONS ── */
.action-btn{padding:5px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);font-size:var(--t-md);color:var(--text2);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px;white-space:nowrap;letter-spacing:-.01em;line-height:1;flex-shrink:0;}
.action-btn:hover{border-color:var(--accent);color:var(--accent);}
.action-btn.primary{background:var(--accent);color:#0d0d0f;border-color:var(--accent);font-weight:700;}
.action-btn.primary:hover{filter:brightness(1.08);}
.del-btn{width:24px;height:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;color:var(--text3);font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.del-btn:hover{border-color:var(--danger);color:var(--danger);}
.add-row-btn{width:100%;height:34px;background:transparent;border:1px solid var(--accent);border-radius:var(--r);font-size:var(--t-md);font-weight:700;color:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s;margin-top:6px;letter-spacing:-.01em;}
.add-row-btn:hover{color:#0d0d0f;background:var(--accent);}
.copy-btn{width:100%;height:36px;border:none;border-radius:var(--r);background:var(--accent);color:#0d0d0f;font-size:var(--t-md);font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s;letter-spacing:-.01em;}
.copy-btn:hover{filter:brightness(1.08);}
.copy-btn.secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.copy-btn.secondary:hover{border-color:var(--accent);color:var(--accent);filter:none;}
.copy-btn.copied{background:var(--blue);color:#fff;}

/* ── LANG PILLS ── */
.lang-pills{display:flex;gap:4px;margin-bottom:10px;}
.lang-pill{flex:1;height:30px;display:flex;align-items:center;justify-content:center;white-space:nowrap;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-size:var(--t-sm);color:var(--text3);cursor:pointer;transition:all .15s;font-weight:500;letter-spacing:-.01em;}
.lang-pill:hover{color:var(--text2);}
.lang-pill.active{background:rgba(200,241,53,.1);border-color:var(--accent);color:var(--accent);}

/* ── FIELD CARDS ── */
.field-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px;transition:border-color .15s;}
.field-card:hover{border-color:rgba(200,241,53,.2);}
.field-card.drag-over{border-color:var(--accent)!important;border-style:dashed;}
.field-card.dragging{opacity:.3;}
.field-card.hidden-card{border-style:dashed;opacity:.5;}
.field-row-inner{display:flex;align-items:center;gap:7px;padding:6px 10px;}
.field-card-sub{padding:0 10px 7px;display:flex;gap:7px;align-items:center;}
.drag-handle{color:var(--text3);cursor:grab;font-size:12px;user-select:none;flex-shrink:0;line-height:1;width:14px;text-align:center;}
.drag-handle:active{cursor:grabbing;color:var(--accent);}
.field-lbl{font-size:var(--t-sm);font-weight:600;color:var(--text3);min-width:58px;flex-shrink:0;letter-spacing:-.01em;}
.unit-sel{width:54px;flex-shrink:0;position:relative;}
.unit-sel::after{content:'▾';position:absolute;right:6px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:9px;}
.unit-sel select{padding:6px 18px 6px 8px;width:100%;font-size:var(--t-md);border-radius:var(--r);}
.date-display{flex:1;padding:6px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-size:var(--t-base);color:var(--text);cursor:pointer;transition:border-color .15s;letter-spacing:-.01em;user-select:none;}
.date-display:hover{border-color:var(--accent);}

/* ── MATERIAL ── */
.mat-picker{padding:8px 10px 10px;border-top:1px solid var(--border);}
.mat-group-lbl{font-size:var(--t-xs);font-weight:700;color:var(--text3);letter-spacing:.04em;margin-bottom:4px;margin-top:8px;text-transform:uppercase;}
.mat-group-lbl:first-child{margin-top:0;}
.mat-chips{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:3px;}
.mat-chip{padding:3px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-size:var(--t-md);color:var(--text3);cursor:pointer;transition:all .12s;letter-spacing:-.01em;}
.mat-chip:hover{border-color:rgba(200,241,53,.4);color:var(--text2);}
.mat-chip.active{background:rgba(200,241,53,.12);border-color:var(--accent);color:var(--accent);font-weight:700;}
.mat-val-display{flex:1;padding:6px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-size:var(--t-base);color:var(--text3);cursor:pointer;transition:border-color .15s;letter-spacing:-.01em;min-height:30px;word-break:break-all;}
.mat-val-display.has-val{color:var(--text);}
.mat-val-display:hover{border-color:var(--accent);}
.mat-chip-toggle{padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);font-size:var(--t-md);color:var(--text3);cursor:pointer;flex-shrink:0;transition:all .15s;letter-spacing:-.01em;}
.mat-chip-toggle:hover{border-color:var(--accent);color:var(--accent);}

/* ── PREVIEW ── */
.pv-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-top:10px;padding:0 12px;}
.pv-row{display:flex;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--border);}
.pv-row:last-child{border-bottom:none;}
.pv-key{font-size:var(--t-sm);font-weight:600;color:var(--text3);width:80px;min-width:80px;flex-shrink:0;padding-right:8px;padding-top:1px;letter-spacing:-.01em;}
.pv-val{font-size:var(--t-base);color:var(--text);line-height:1.55;word-break:break-word;letter-spacing:-.01em;flex:1;}
.pv-empty{color:var(--text3);font-style:italic;}

/* ── CAUTION EDIT ── */
.cau-item{display:flex;gap:7px;align-items:flex-start;margin-bottom:5px;}
.cau-sym{flex-shrink:0;font-size:var(--t-base);padding-top:6px;min-width:20px;color:var(--accent);}
.cau-item-ta{flex:1;padding:6px 9px;border:1px solid var(--border);border-radius:var(--r);font-size:var(--t-base);background:var(--surface2);outline:none;resize:none;min-height:32px;color:var(--text);overflow:hidden;letter-spacing:-.01em;line-height:1.55;}
.cau-item-ta:focus{border-color:var(--accent);}

/* ── SETTINGS (flat accordion) ── */
.acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:border-color .15s;margin-bottom:3px;user-select:none;}
.acc-hdr:hover{border-color:rgba(200,241,53,.3);}
.acc-lbl{font-size:var(--t-md);font-weight:600;color:var(--text2);letter-spacing:-.01em;}
.acc-meta{font-size:var(--t-xs);color:var(--text3);}
.acc-arrow{font-size:9px;color:var(--text3);transition:transform .2s;}
.acc-arrow.open{transform:rotate(180deg);}
.acc-body{padding:4px 0 6px 10px;border-left:2px solid rgba(200,241,53,.2);margin:0 0 10px 5px;}
.acc-item{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid rgba(42,42,53,.6);}
.acc-item:last-of-type{border-bottom:none;}
.ord-btns{display:flex;flex-direction:column;gap:0;flex-shrink:0;}
.ord-btn{width:20px;height:13px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:8px;padding:0;line-height:1;display:flex;align-items:center;justify-content:center;}
.ord-btn:hover:not(:disabled){color:var(--accent);}
.ord-btn:disabled{opacity:.25;cursor:default;}

/* ── MONTH PICKER ── */
.mp-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.75);display:none;align-items:flex-end;justify-content:center;}
.mp-overlay.open{display:flex;}
.mp-box{background:var(--surface);border:1px solid var(--border);border-top-left-radius:12px;border-top-right-radius:12px;padding:20px 18px 28px;width:100%;max-width:380px;}
.mp-year-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.mp-yr-btn{width:32px;height:32px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;color:var(--text2);font-size:var(--t-base);display:flex;align-items:center;justify-content:center;}
.mp-yr-btn:hover{border-color:var(--accent);color:var(--accent);}
.mp-yr-lbl{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.02em;}
.mp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.mp-m-btn{height:38px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-size:var(--t-md);color:var(--text2);transition:all .15s;letter-spacing:-.01em;}
.mp-m-btn:hover{border-color:var(--accent);color:var(--accent);}
.mp-m-btn.active{background:rgba(200,241,53,.15);border-color:var(--accent);color:var(--accent);font-weight:700;}
.mp-cancel{margin-top:10px;width:100%;height:36px;background:transparent;border:1px solid var(--border);border-radius:var(--r);color:var(--text3);font-size:var(--t-md);cursor:pointer;letter-spacing:-.01em;}
.mp-cancel:hover{border-color:var(--danger);color:var(--danger);}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-top-left-radius:12px;border-top-right-radius:12px;width:100%;max-width:520px;max-height:80vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,16px);}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;border-bottom:1px solid var(--border);}
.modal-title{font-size:var(--t-md);font-weight:700;color:var(--text);letter-spacing:-.01em;}
.modal-close{width:26px;height:26px;background:none;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;color:var(--text3);font-size:10px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.modal-close:hover{border-color:var(--danger);color:var(--danger);}
.modal-body{padding:14px;}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--accent);color:#0d0d0f;padding:7px 16px;border-radius:20px;font-size:var(--t-md);font-weight:700;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:999;letter-spacing:-.01em;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes spin{to{transform:rotate(360deg);}}
.spin-a{display:inline-block;width:11px;height:11px;border:2px solid rgba(200,241,53,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .55s linear infinite;vertical-align:middle;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
@media(min-width:680px){
  .content-inner{padding:16px 20px 80px;}
  .mp-overlay,.modal-overlay{align-items:center;}
  .mp-box,.modal-box{border-radius:10px;}
}
</style>
</head>
<body>
<div id="app">
  <div class="gnb">
    <div class="gnb-top">
      <div class="logo">MD SPEC<span> / 상품정보 관리</span></div>
      <button class="gnb-csv" onclick="exportCSV()">↓ CSV 내보내기</button>
    </div>
    <div class="gnb-nav">
      <button class="gnb-tab active" data-tab="fields" onclick="setTab('fields')">필드편집</button>
      <button class="gnb-tab" data-tab="prev" onclick="setTab('prev')">미리보기</button>
      <button class="gnb-tab" data-tab="caution" onclick="setTab('caution')">주의사항</button>
      <button class="gnb-tab" data-tab="settings" onclick="setTab('settings')">기본설정</button>
    </div>
  </div>
  <div class="content"><div class="content-inner" id="ci"></div></div>
</div>

<div class="mp-overlay" id="mpOverlay" onclick="if(event.target===this)closeMp()">
  <div class="mp-box">
    <div class="mp-year-row">
      <button class="mp-yr-btn" onclick="mpAdjYear(-1)">◀</button>
      <span class="mp-yr-lbl" id="mpYearLbl"></span>
      <button class="mp-yr-btn" onclick="mpAdjYear(1)">▶</button>
    </div>
    <div class="mp-grid" id="mpGrid"></div>
    <button class="mp-cancel" onclick="closeMp()">취소</button>
  </div>
</div>

<div class="modal-overlay" id="fieldPickerModal" onclick="if(event.target===this)closeFieldPicker()">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">상품 정보 항목 추가</div>
      <button class="modal-close" onclick="closeFieldPicker()">✕</button>
    </div>
    <div class="modal-body" id="fieldPickerBody"></div>
  </div>
</div>

<div class="modal-overlay" id="addModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">주의사항 항목 추가</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <textarea class="form-input" id="addModalTa" rows="3" placeholder="내용 입력..." style="margin-bottom:10px"></textarea>
      <button style="width:100%;height:38px;border:none;border-radius:var(--r);background:var(--accent);color:#0d0d0f;font-size:var(--t-md);font-weight:700;cursor:pointer;letter-spacing:-.01em" onclick="confirmAddCauItem()">추가</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════ CONSTANTS ═══════════════
var FIELD_DEFS=[
  {key:'name',    labels:{ko:'품명',     en:'Product',            ja:'品名',       'zh-cn':'品名',    'zh-tw':'品名'}},
  {key:'size',    labels:{ko:'사이즈',   en:'Size',               ja:'サイズ',     'zh-cn':'尺寸',    'zh-tw':'尺寸'}},
  {key:'weight',  labels:{ko:'무게',     en:'Weight',             ja:'重量',       'zh-cn':'重量',    'zh-tw':'重量'}},
  {key:'age',     labels:{ko:'사용연령', en:'Age',                ja:'対象年齢',   'zh-cn':'适用年龄','zh-tw':'適用年齡'}},
  {key:'contents',labels:{ko:'구성',     en:'Contents',           ja:'セット内容', 'zh-cn':'内容物',  'zh-tw':'内容物'}},
  {key:'material',labels:{ko:'소재',     en:'Materials',          ja:'素材',       'zh-cn':'材质',    'zh-tw':'材質'}},
  {key:'mfgDate', labels:{ko:'제조연월', en:'Manufacturing Date', ja:'製造年月',   'zh-cn':'生产日期','zh-tw':'生產日期'}},
  {key:'origin',  labels:{ko:'제조국',   en:'Country of Origin',  ja:'原産国',     'zh-cn':'原产地',  'zh-tw':'原產地'}},
  {key:'mfr',     labels:{ko:'제조사',   en:'Manufacturer',       ja:'製造元',     'zh-cn':'制造商',  'zh-tw':'製造商'}},
  {key:'importer',labels:{ko:'수입사',   en:'Importer',           ja:'輸入元',     'zh-cn':'进口商',  'zh-tw':'進口商'}},
  {key:'dist',    labels:{ko:'판매원',   en:'Distributor',        ja:'販売元',     'zh-cn':'销售商',  'zh-tw':'銷售商'}}
];

var CAU_LBL={ko:'주의사항',en:'Cautions',ja:'ご使用上の注意','zh-cn':'注意事项','zh-tw':'注意事項'};

var CAUTION_FULL={

function uid(){return '_'+Math.random().toString(36).slice(2,9)+Date.now().toString(36);}
function cur(){return S.products.find(function(p){return p.id===S.cur;});}
function getLabel(field,lang){
  if(field.customLabels) return field.customLabels[lang]||field.customLabels.ko||'';
  var d=FIELD_DEFS.find(function(x){return x.key===field.defKey;});
  return d?(d.labels[lang]||''):'';
}
function getSym(style,i){
  if(style==='circle') return SYM_C[i]||'('+(i+1)+')';
  if(style==='filled') return SYM_F[i]||'('+(i+1)+')';
  if(style==='number') return (i+1)+'.';
  if(style==='bullet') return '•';
  if(style==='hyphen') return '–';
  return SYM_C[i];
}
function eh(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ar(el){if(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}}
function getNextMonth(){var d=new Date();d.setMonth(d.getMonth()+1);return d.getFullYear()+'. '+String(d.getMonth()+1).padStart(2,'0')+'.';}
function sanitizeSize(val){return val.replace(/[ㅌxX*]/g,'×');}
function fmtWithUnit(val,unit){if(!val)return '';return unit?val+' '+unit:val;}
function isDropdownField(key){return key==='origin'||key==='age'||key==='mfr'||key==='importer'||key==='dist';}
function getOptionsForField(key){
  if(key==='origin') return S.settings.originOptions||['한국','중국'];
  if(key==='age')    return S.settings.ageOptions||['14세 이상'];
  if(key==='mfr')    return S.settings.mfrOptions;
  if(key==='importer') return S.settings.importerOptions;
  if(key==='dist')   return S.settings.distOptions;
  return [];
}
function applyPresetToVals(vals,koVal){
  vals.ko=koVal;
  var tr=PRESET_TR[koVal];
  if(tr){['en','ja','zh-cn','zh-tw'].forEach(function(l){vals[l]=tr[l]||koVal;});}
  else{['en','ja','zh-cn','zh-tw'].forEach(function(l){vals[l]=koVal;});}
}
function getCauSrc(ver){
  var tmpl=S.settings.cauTemplates;
  if(tmpl&&tmpl[ver]) return tmpl[ver];
  if(ver==='full') return CAUTION_FULL;
  if(ver==='simple') return CAUTION_SIMPLE;
  if(ver==='care') return CAUTION_CARE;
  return CAUTION_FULL;
}

  if(!S.settings.cauTemplates) S.settings.cauTemplates={

  };
  if(!S.products.length){var p=mkProduct('새 상품');S.products.push(p);S.cur=p.id;}
  S.products.forEach(function(p){
    p.fields.forEach(function(f){
      if(f.defKey==='size'&&!f.unit) f.unit='mm';
      if(f.defKey==='weight'&&!f.unit) f.unit='g';
      if(isDropdownField(f.defKey)){
        var opts=getOptionsForField(f.defKey);
        if(f.values.ko&&opts.indexOf(f.values.ko)===-1) _customMode[f.id]=true;

function mkField(key){
  var vals={ko:'',en:'',ja:'','zh-cn':'','zh-tw':''};
  if(key==='age')      applyPresetToVals(vals,'14세 이상');
  if(key==='origin')   applyPresetToVals(vals,'중국');
  if(key==='mfgDate')  {var nm=getNextMonth();['ko','en','ja','zh-cn','zh-tw'].forEach(function(l){vals[l]=nm;});}
  if(key==='mfr')      {var v=(S.settings.mfrOptions||[])[0]||'';['ko','en','ja','zh-cn','zh-tw'].forEach(function(l){vals[l]=v;});}
  if(key==='importer') {var v=(S.settings.importerOptions||[])[0]||'';['ko','en','ja','zh-cn','zh-tw'].forEach(function(l){vals[l]=v;});}
  if(key==='dist')     {var v=(S.settings.distOptions||[])[0]||'';['ko','en','ja','zh-cn','zh-tw'].forEach(function(l){vals[l]=v;});}
  var f={id:uid(),defKey:key,customLabels:null,values:vals,hidden:false};
  if(key==='size')   f.unit='mm';
  if(key==='weight') f.unit='g';
  return f;
}

}

var _trCache={};
try{_trCache=JSON.parse(localStorage.getItem('mdspec_trc')||'{}');}catch(e){}
function saveCache(){
  try{
    var k=Object.keys(_trCache);
    if(k.length>600){var nc={};k.slice(-400).forEach(function(x){nc[x]=_trCache[x];});_trCache=nc;}
    localStorage.setItem('mdspec_trc',JSON.stringify(_trCache));
  }catch(e){}
}
function trText(text,toLangCode){
  if(!text||!text.trim()) return Promise.resolve('');
  var toLang=LANGS.find(function(l){return l.code===toLangCode;});
  var apiLang=toLang?toLang.api:toLangCode;
  var ck=toLangCode+'::'+text.trim();
  if(_trCache[ck]) return Promise.resolve(_trCache[ck]);
  return fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(text.trim())+'&langpair=ko|'+apiLang)
    .then(function(r){return r.json();})
    .then(function(d){var r=(d.responseStatus===200)?d.responseData.translatedText:text;_trCache[ck]=r;saveCache();return r;})
    .catch(function(){return text;});
}
function trAll(){
  var p=cur();if(!p)return;
  var btn=document.getElementById('btnTrAll');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin-a"></span> 번역 중...';}
  var fields=p.fields.filter(function(f){return f.values.ko&&f.values.ko.trim();});
  var fi=0,langs=['en','ja','zh-cn','zh-tw'];
  function nxtF(){
    if(fi>=fields.length){save();renderContent();showToast('전체 번역 완료');return;}
    var f=fields[fi++];
    var preset=PRESET_TR[f.values.ko];
    if(preset){langs.forEach(function(l){f.values[l]=preset[l]||f.values.ko;});nxtF();return;}
    if(isCopyAsIs(f.defKey)){langs.forEach(function(l){f.values[l]=f.values.ko;});nxtF();return;}
    var li=0;
    function nxtL(){
      if(li>=langs.length){nxtF();return;}
      var lang=langs[li++];
      trText(f.values.ko,lang).then(function(r){f.values[lang]=r;nxtL();});
    }
    nxtL();
  }
  nxtF();
}

// ═══════════════ MATERIAL ═══════════════
function findMaterialItem(ko){
  for(var i=0;i<MATERIAL_OPTS.length;i++){var g=MATERIAL_OPTS[i];for(var j=0;j<g.items.length;j++){if(g.items[j].ko===ko)return g.items[j];}}
  return null;
}
function initMatSel(fid,koVal){
  if(_matSel[fid]) return;
  _matSel[fid]=[];
  if(!koVal) return;
  koVal.split(/[,、]+/).map(function(s){return s.trim();}).forEach(function(p){if(findMaterialItem(p))_matSel[fid].push(p);});
}
function rebuildMatVals(fid){
  var p=cur();if(!p)return;
  var f=p.fields.find(function(x){return x.id===fid;});if(!f)return;
  var sel=_matSel[fid]||[];
  if(sel.length===0){LANGS.forEach(function(l){f.values[l.code]='';});}
  else{LANGS.forEach(function(l){f.values[l.code]=sel.map(function(ko){var item=findMaterialItem(ko);return item?(item[l.code]||ko):ko;}).join(', ');});}
  save();
}
function toggleMatPicker(fid){
  var p=cur();if(!p)return;
  var f=p.fields.find(function(x){return x.id===fid;});if(!f)return;
  _matOpen=(_matOpen===fid)?null:fid;
  if(_matOpen) initMatSel(fid,f.values.ko);
  renderContent();
}
function toggleMat(fid,ko){
  if(!_matSel[fid])_matSel[fid]=[];
  var sel=_matSel[fid],idx=sel.indexOf(ko);
  if(idx===-1)sel.push(ko);else sel.splice(idx,1);
  rebuildMatVals(fid);renderContent();
}
function setMatCustomVal(fid,val){
  var p=cur();if(!p)return;
  var f=p.fields.find(function(x){return x.id===fid;});if(!f)return;
  _matSel[fid]=[];f.values.ko=val;save();
}

function onDS(e,id){_dragId=id;e.dataTransfer.effectAllowed='move';setTimeout(function(){var el=document.getElementById('fc_'+id);if(el)el.classList.add('dragging');},0);}
function onDE(e,id){var el=document.getElementById('fc_'+id);if(el)el.classList.remove('dragging');document.querySelectorAll('.field-card').forEach(function(c){c.classList.remove('drag-over');});}
function onDO(e,id){e.preventDefault();if(id!==_dragId){document.querySelectorAll('.field-card').forEach(function(c){c.classList.remove('drag-over');});var el=document.getElementById('fc_'+id);if(el)el.classList.add('drag-over');}}
function onDrop(e,tgtId){

  var p=cur();if(!p)return;
  var si=p.fields.findIndex(function(f){return f.id===_dragId;});
  var ti=p.fields.findIndex(function(f){return f.id===tgtId;});
  var rm=p.fields.splice(si,1)[0];p.fields.splice(ti,0,rm);

}

// ═══════════════ EXPORT & COPY ═══════════════
function exportCSV(){
  if(!S.products.length){showToast('상품이 없습니다');return;}
  var lls=['ko','en','ja','zh-cn','zh-tw'];
  var llbls={ko:'국문',en:'English',ja:'日本語','zh-cn':'中文(简体)','zh-tw':'中文(繁體)'};
  var rows=[['상품명','항목'].concat(lls.map(function(l){return llbls[l];}))];
  S.products.forEach(function(p){
    p.fields.filter(function(f){return !f.hidden;}).forEach(function(f){
      rows.push([p.name,getLabel(f,'ko')].concat(lls.map(function(l){return fmtWithUnit(f.values[l]||'',f.unit);})));
    });
    var cRow=[p.name,CAU_LBL.ko];
    lls.forEach(function(l){cRow.push(p.cautions.texts[l].map(function(t,i){return getSym(p.cautions.style,i)+' '+t;}).join(' '));});
    rows.push(cRow);rows.push([]);
  });
  var csv='﻿'+rows.map(function(r){return r.map(function(c){return '"'+String(c||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='md_상품정보.csv';a.click();URL.revokeObjectURL(a.href);
  showToast('CSV 저장 완료');
}
function genTextProse(p,lang){
  var parts=p.fields.filter(function(f){return !f.hidden;}).map(function(f){return getLabel(f,lang)+' '+fmtWithUnit(f.values[lang]||'',f.unit);});
  var cauParts=p.cautions.texts[lang].map(function(t,i){return getSym(p.cautions.style,i)+' '+t;});
  parts.push(CAU_LBL[lang]+' '+cauParts.join(' '));
  return parts.join(' / ');
}
function genTextLines(p,lang){
  var lines=p.fields.filter(function(f){return !f.hidden;}).map(function(f){return getLabel(f,lang)+'  '+fmtWithUnit(f.values[lang]||'',f.unit);});
  lines.push(CAU_LBL[lang]);
  p.cautions.texts[lang].forEach(function(t,i){lines.push(getSym(p.cautions.style,i)+' '+t);});
  return lines.join('\n');
}

function _da(fid){
  return ' id="fc_'+fid+'" draggable="true"'
    +' ondragstart="onDS(event,\''+fid+'\')" ondragend="onDE(event,\''+fid+'\')"'
    +' ondragover="onDO(event,\''+fid+'\')" ondrop="onDrop(event,\''+fid+'\')"';

function renderFieldCard(f){
  if(f.hidden) return renderHiddenCard(f);
  var key=f.defKey;
  if(key==='mfgDate')  return renderDateCard(f);
  if(key==='material') return renderMaterialCard(f);
  if(key==='size')     return renderSizeCard(f);
  if(key==='weight')   return renderWeightCard(f);
  if(isDropdownField(key)) return renderSelectCard(f);
  return renderTextCard(f);
}

function renderSelectCard(f){

  var optHtml=opts.map(function(o){return'<option value="'+eh(o)+'"'+(selVal===o?' selected':'')+'>'+eh(o)+'</option>';}).join('');

function renderDateCard(f){
  var lbl=getLabel(f,'ko'),val=f.values.ko||getNextMonth();
  return '<div class="field-card"'+_da(f.id)+'><div class="field-row-inner"><span class="drag-handle">⠿</span>'
    +'<span class="field-lbl">'+eh(lbl)+'</span>'
    +'<div class="date-display" onclick="openMp(\''+f.id+'\')">'+eh(val)+'</div>'
    +'<button class="del-btn" onclick="delField(\''+f.id+'\')">✕</button>'
    +'</div></div>';
}
function renderMaterialCard(f){
  var lbl=getLabel(f,'ko'),val=f.values.ko,isOpen=(_matOpen===f.id);
  if(isOpen)initMatSel(f.id,val);
  var sel=_matSel[f.id]||[];
  var pickerHtml='';
  if(isOpen){
    var gHtml=MATERIAL_OPTS.map(function(g){
      return '<div class="mat-group-lbl">'+eh(g.group)+'</div><div class="mat-chips">'
        +g.items.map(function(item){
          var a=sel.indexOf(item.ko)!==-1;
          return '<button class="mat-chip'+(a?' active':'')+'" onclick="toggleMat(\''+f.id+'\',\''+eh(item.ko)+'\')">'+eh(item.ko)+'</button>';
        }).join('')+'</div>';
    }).join('');
    pickerHtml='<div class="mat-picker">'+gHtml
      +'<div style="display:flex;gap:6px;align-items:center;margin-top:8px;padding-top:7px;border-top:1px solid var(--border)">'
      +'<span style="font-size:9px;color:var(--text3);flex-shrink:0">직접 입력</span>'
      +'<input class="form-input sm" style="flex:1" placeholder="직접 입력" value="'+eh(val)+'" oninput="setMatCustomVal(\''+f.id+'\',this.value)">'
      +'</div></div>';
  }
  return '<div class="field-card"'+_da(f.id)+'>'
    +'<div class="field-row-inner"><span class="drag-handle">⠿</span>'
    +'<span class="field-lbl">'+eh(lbl)+'</span>'
    +'<div class="mat-val-display'+(val?' has-val':'')+'" onclick="toggleMatPicker(\''+f.id+'\')">'
    +(val?eh(val):'<span style="color:var(--text3)">소재 선택</span>')+'</div>'
    +'<button class="mat-chip-toggle" onclick="toggleMatPicker(\''+f.id+'\')">'+(isOpen?'닫기':'선택')+'</button>'
    +'<button class="del-btn" onclick="delField(\''+f.id+'\')">✕</button>'
    +'</div>'+pickerHtml+'</div>';
}

// ── 주의사항 (필드편집 내) ──
function renderCauSection(p){
  var ver=p.cautions.version,style=p.cautions.style;
  var items=p.cautions.texts['ko']||[];
  var verOpts=[{v:'full',l:'풀버전 (8항목)'},{v:'simple',l:'심플버전 (2항목)'},{v:'care',l:'케어라벨'}]
    .map(function(o){return'<option value="'+o.v+'"'+(ver===o.v?' selected':'')+'>'+o.l+'</option>';}).join('');
  var styleOpts=CSTYLES.map(function(s){return'<option value="'+s.id+'"'+(style===s.id?' selected':'')+'>'+s.label+'</option>';}).join('');
  var itemsHtml=items.map(function(t,i){
    return '<div class="cau-item"><span class="cau-sym">'+getSym(style,i)+'</span>'
      +'<textarea class="cau-item-ta" oninput="ar(this);setCauText(\'ko\','+i+',this.value)">'+eh(t)+'</textarea>'
      +'<button class="del-btn" onclick="delCauItem(\'ko\','+i+')">✕</button></div>';
  }).join('');
  return '<div class="sect-hdr">주의사항</div>'
    +'<div style="display:flex;gap:6px;margin-bottom:10px">'
    +'<div class="sel-wrap" style="flex:1"><select class="form-input sm" onchange="setCauVer(this.value)">'+verOpts+'</select></div>'
    +'<div class="sel-wrap" style="flex:1"><select class="form-input sm" onchange="setCauStyle(this.value)">'+styleOpts+'</select></div>'
    +'</div>'
    +itemsHtml
    +'<button class="add-row-btn" onclick="openModal()">+ 주의사항 항목 추가</button>';
}

// ── 미리보기 ──
function tabPrev(p){
  var lang=S.prevLang;
  var pills=LANGS.map(function(l){
    return '<button class="lang-pill'+(l.code===lang?' active':'')+'" onclick="S.prevLang=\''+l.code+'\';renderContent()">'+l.label+'</button>';
  }).join('');
  var rows=p.fields.filter(function(f){return !f.hidden;}).map(function(f){
    var lbl=getLabel(f,lang),val=fmtWithUnit(f.values[lang]||'',f.unit);
    return '<div class="pv-row"><span class="pv-key">'+eh(lbl)+'</span>'
      +'<span class="pv-val">'+(val?eh(val):'<span class="pv-empty">미입력</span>')+'</span></div>';
  }).join('');
  var cauItems=p.cautions.texts[lang]||[];
  var cauRows=cauItems.map(function(t,i){
    return '<div class="pv-row"><span class="pv-key">'+(i===0?eh(CAU_LBL[lang]):'')+'</span>'
      +'<span class="pv-val">'+eh(getSym(p.cautions.style,i)+' '+t)+'</span></div>';
  }).join('');
  return productRowHtml(p)
    +'<div class="lang-pills">'+pills+'</div>'
    +'<div class="pv-section">'+rows+cauRows+'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px">'
    +'<button class="copy-btn" id="cpBtn_pr" onclick="copyLangProse(\''+lang+'\')">줄글 복사</button>'
    +'<button class="copy-btn secondary" id="cpBtn_ln" onclick="copyLangLines(\''+lang+'\')">항목별 복사</button>'
    +'</div>'
    +'<button class="copy-btn secondary" id="cpBtn_all" onclick="copyAll()" style="margin-top:6px">전체 언어 복사 (줄글)</button>';
}

// ── 기본설정 ──
function tabSettings(){
  var SECTIONS=[
    {key:'originOptions',  label:'제조국'},
    {key:'ageOptions',     label:'사용연령'},
    {key:'mfrOptions',     label:'제조사'},
    {key:'importerOptions',label:'수입사'},
    {key:'distOptions',    label:'판매원'}
  ];
  var html='<p style="font-size:10px;color:var(--text3);margin-bottom:12px;letter-spacing:-.01em">드롭다운 항목을 필드별로 관리합니다. ▲▼로 순서 변경.</p>';
  SECTIONS.forEach(function(sec){
    var isOpen=!!_settingsOpen[sec.key];
    var count=S.settings[sec.key]?S.settings[sec.key].length:0;
    html+='<div class="acc-hdr" onclick="toggleSettingSection(\''+sec.key+'\')">'
      +'<span class="acc-lbl">'+sec.label+'</span>'
      +'<span style="display:flex;align-items:center;gap:8px">'
      +'<span class="acc-meta">'+count+'개</span>'
      +'<span class="acc-arrow'+(isOpen?' open':'')+'">▾</span>'
      +'</span></div>';
    if(isOpen){
      var items=(S.settings[sec.key]||[]).map(function(opt,i){
        var isFirst=i===0,isLast=i===(S.settings[sec.key].length-1);
        return '<div class="acc-item" draggable="true"'
          +' ondragstart="onSettDS(event,\''+sec.key+'\','+i+')"'
          +' ondragover="event.preventDefault()"'
          +' ondrop="onSettDrop(event,\''+sec.key+'\','+i+')">'
          +'<span class="drag-handle">⠿</span>'
          +'<div class="ord-btns">'
          +'<button class="ord-btn" onclick="moveSettingOpt(\''+sec.key+'\','+i+',-1)"'+(isFirst?' disabled':'')+'>▲</button>'
          +'<button class="ord-btn" onclick="moveSettingOpt(\''+sec.key+'\','+i+',1)"'+(isLast?' disabled':'')+'>▼</button>'
          +'</div>'
          +'<input class="form-input sm" style="flex:1" data-sopt="'+sec.key+'" value="'+eh(opt)+'"'
          +' oninput="updateSettingOpt(\''+sec.key+'\','+i+',this.value)" onchange="updateSettingOpt(\''+sec.key+'\','+i+',this.value)">'
          +'<button class="del-btn" onclick="delSettingOpt(\''+sec.key+'\','+i+')">✕</button>'
          +'</div>';
      }).join('');
      html+='<div class="acc-body">'+items
        +'<button class="add-row-btn" style="margin-top:4px" onclick="addSettingOpt(\''+sec.key+'\')">+ 추가</button>'
        +'</div>';
    }else{
      html+='<div style="margin-bottom:4px"></div>';
    }
  });
  return html;
}

// ═══════════════ CAUTION TEMPLATE ACTIONS ═══════════════
function toggleCauVerSection(ver){_cauVerOpen[ver]=!_cauVerOpen[ver];renderContent();}
function moveCauTmplItem(ver,lang,i,dir){
  var arr=S.settings.cauTemplates[ver][lang],j=i+dir;
  if(j<0||j>=arr.length)return;
  var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;save();renderContent();
}
function delCauTmplItem(ver,lang,i){
  S.settings.cauTemplates[ver][lang].splice(i,1);save();renderContent();
}
function updateCauTmplItem(ver,lang,i,val){S.settings.cauTemplates[ver][lang][i]=val;save();}
function addCauTmplItem(ver,lang){
  S.settings.cauTemplates[ver][lang].push('');save();renderContent();
  setTimeout(function(){var ls=document.querySelectorAll('[data-ctmpl="'+ver+'_'+lang+'"]');if(ls.length)ls[ls.length-1].focus();},60);
}
function resetCauTmpl(ver){
  var src=ver==='full'?CAUTION_FULL:ver==='simple'?CAUTION_SIMPLE:CAUTION_CARE;
  ['ko','en','ja','zh-cn','zh-tw'].forEach(function(l){S.settings.cauTemplates[ver][l]=src[l].slice();});
  save();renderContent();showToast('기본값으로 초기화됨');
}

// ── 주의사항 버전관리 탭 ──
function tabCaution(){
  var VERS=[{v:'full',l:'풀버전'},{v:'simple',l:'심플버전'},{v:'care',l:'케어라벨'}];
  var lang=_cauTmpLang;
  var pills=LANGS.map(function(l){
    return '<button class="lang-pill'+(l.code===lang?' active':'')+'" onclick="_cauTmpLang=\''+l.code+'\';renderContent()">'+l.label+'</button>';
  }).join('');
  var html='<p style="font-size:10px;color:var(--text3);margin-bottom:10px;letter-spacing:-.01em">버전별 기본 주의사항 문구를 수정합니다. 상품에서 버전 선택 시 이 기본값이 사용됩니다.</p>'
    +'<div class="lang-pills" style="margin-bottom:12px">'+pills+'</div>';
  VERS.forEach(function(vr){
    var isOpen=!!_cauVerOpen[vr.v];
    var tmpl=S.settings.cauTemplates||{};
    var items=(tmpl[vr.v]&&tmpl[vr.v][lang])||[];
    html+='<div class="acc-hdr" onclick="toggleCauVerSection(\''+vr.v+'\')">'
      +'<span class="acc-lbl">'+vr.l+'</span>'
      +'<span style="display:flex;align-items:center;gap:8px">'
      +'<span class="acc-meta">'+items.length+'개 항목</span>'
      +'<span class="acc-arrow'+(isOpen?' open':'')+'">▾</span>'
      +'</span></div>';
    if(isOpen){
      var itemsHtml=items.map(function(t,i){
        var isFirst=i===0,isLast=i===items.length-1;
        return '<div style="display:flex;gap:6px;align-items:flex-start;padding:3px 0;border-bottom:1px solid rgba(42,42,53,.6)" draggable="true"'
          +' ondragstart="onCauTmplDS(event,\''+vr.v+'\',\''+lang+'\','+i+')"'
          +' ondragover="event.preventDefault()"'
          +' ondrop="onCauTmplDrop(event,\''+vr.v+'\',\''+lang+'\','+i+')">'
          +'<span class="drag-handle" style="padding-top:8px">⠿</span>'
          +'<div class="ord-btns" style="padding-top:6px">'
          +'<button class="ord-btn" onclick="moveCauTmplItem(\''+vr.v+'\',\''+lang+'\','+i+',-1)"'+(isFirst?' disabled':'')+'>▲</button>'
          +'<button class="ord-btn" onclick="moveCauTmplItem(\''+vr.v+'\',\''+lang+'\','+i+',1)"'+(isLast?' disabled':'')+'>▼</button>'
          +'</div>'
          +'<textarea class="cau-item-ta" data-ctmpl="'+vr.v+'_'+lang+'" style="flex:1" oninput="ar(this);updateCauTmplItem(\''+vr.v+'\',\''+lang+'\','+i+',this.value)">'+eh(t)+'</textarea>'
          +'<button class="del-btn" style="margin-top:5px" onclick="delCauTmplItem(\''+vr.v+'\',\''+lang+'\','+i+')">✕</button>'
          +'</div>';
      }).join('');
      html+='<div class="acc-body">'+itemsHtml
        +'<div style="display:flex;gap:6px;margin-top:6px">'
        +'<button class="add-row-btn" style="flex:1;margin-top:0" onclick="addCauTmplItem(\''+vr.v+'\',\''+lang+'\')">+ 항목 추가</button>'
        +'<button class="action-btn" onclick="resetCauTmpl(\''+vr.v+'\')" style="flex-shrink:0">초기화</button>'
        +'</div></div>';
    }else{
      html+='<div style="margin-bottom:4px"></div>';
    }
  });
  return html;
}
